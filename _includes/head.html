<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
  
    <title>
      {%- if page.title -%}
        {{ page.title }}
      {%- else -%}
        {{ site.title }}
      {%- endif -%}
    </title>
  
    {%-seo title=false-%}
    {%-feed_meta-%}
  
    <link rel="shortcut icon" type="image/x-icon" href="{{ site.favicon | relative_url }}" />
    <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}" />

    <link rel="stylesheet" href="/assets/css/fontawesome.min.css">
    <link rel="stylesheet" href="/assets/highlight/default.css">
    <link rel="stylesheet" href="/assets/highlight/vs2015.css">
    <script src="/assets/highlight/highlight.min.js"></script>
    <script>
        // hljs.configure({
        //     cssSelector: 'pre code, p code, li code',
        // });
        hljs.addPlugin({
            'after:highlightElement': function(args) {
                console.log(args)
                args.el.insertAdjacentHTML('afterbegin', '<label>' + args.result.language + '</label>');
            }
        })
        hljs.highlightAll();
    </script>
    {% if page.mathjax %}
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    {% endif %}
  </head>
