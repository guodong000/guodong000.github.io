---
layout: default
title: Notes
---
<h1 class="title">Dong's Notes</h1>
<div class="mb30"></div>
<ul class="posts">
    {% for post in site.posts %}
    <li>
        <span class="date">[{{ post.date | date: "%Y-%m-%d" }}]</span>
        <a href="{{ post.url }}">{{ post.title }}</a>
    </li>
    {% endfor %}
</ul>
